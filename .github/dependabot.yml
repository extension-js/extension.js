version: 2
updates:
  # Main workspace (pnpm lockfile + workspace package.json files)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      # TypeScript majors are taken by hand. Nothing here depends on the
      # TypeScript *JS API* any more (the classic-concat loader was the last
      # consumer and now uses rspack's bundled swc plus acorn), so `typescript`
      # is devDependencies-only: it builds this repo and its .d.ts output and
      # is never shipped to consumers. TypeScript 7 already removed the JS API
      # entirely; a future major could just as easily change what `tsc` and
      # declaration emit do, so a human should confirm the build and the
      # generated declarations before it lands.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    labels:
      - "dependencies"

