name: CI – Optional Deps Matrix

on:
  pull_request:
    paths:
      - 'programs/**'
      - 'extensions/browser-extension/**'
      - 'extensions/monorepo/**'
      - 'scripts/**'
      - '.github/workflows/optional-deps-matrix.yml'
      - '.github/workflows/publish-release.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - 'programs/**'
      - 'extensions/browser-extension/**'
      - 'extensions/monorepo/**'
      - 'scripts/**'
      - '.github/workflows/optional-deps-matrix.yml'
      - '.github/workflows/publish-release.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: optional-deps-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optional-deps-lib-specs:
    name: optional-deps-lib specs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run optional deps library specs
        run: pnpm run ci:test:isolated-deps

  optional-deps-smoke:
    name: smoke (${{ matrix.os }} / ${{ matrix.pm }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pm: pnpm
          - os: ubuntu-latest
            pm: npm
          - os: ubuntu-latest
            pm: yarn
          - os: ubuntu-latest
            pm: bun
          - os: macos-latest
            pm: pnpm
          - os: windows-latest
            pm: pnpm
          - os: windows-latest
            pm: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable corepack for Yarn
        if: matrix.pm == 'yarn'
        run: corepack enable

      - name: Setup Bun
        if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Test optional deps smoke helpers
        run: node --test scripts/__spec__/run-optional-deps-smoke.spec.mjs

      - name: Run optional deps smoke
        run: node scripts/run-optional-deps-smoke.mjs --pm ${{ matrix.pm }}

      - name: Compile local Extension.js packages for workspace first-dev check
        if: matrix.os == 'windows-latest' && matrix.pm == 'npm'
        run: pnpm --dir programs/create run compile && pnpm --dir programs/develop run compile && pnpm --dir programs/cli run compile

      - name: Verify first dev content-react contract (Windows npm)
        if: matrix.os == 'windows-latest' && matrix.pm == 'npm'
        run: node scripts/verify-content-template-first-dev.mjs --templates content-react --use-default-cache --use-workspace-package
