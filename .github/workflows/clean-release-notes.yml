# One-off workflow to retroactively clean past GitHub release bodies.
# Removes release-machinery lines from release notes, in both subject styles.
#
# Trigger: workflow_dispatch
# Or: gh workflow run clean-release-notes.yml
name: Clean release notes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Clean release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/clean-release-notes.mjs
