name: 🛠

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run test suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - ci:test:develop
          - ci:test:cli
          - ci:test:plugin-extension
          - ci:test:plugin-browsers
          - ci:test:plugin-compilation
          - ci:test:plugin-css
          - ci:test:plugin-js-frameworks
          - ci:test:plugin-compatibility
          - ci:test:plugin-static-assets
          - ci:test:toolchain-preflight
          - ci:test:core

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install browsers (cli suite)
        if: matrix.suite == 'ci:test:cli'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends firefox xvfb
          sudo apt-get install -y --no-install-recommends chromium-browser || sudo apt-get install -y --no-install-recommends chromium
          echo "EXTENSION_TEST_GECKO_BINARY=$(command -v firefox || true)" >> $GITHUB_ENV
          echo "EXTENSION_TEST_CHROMIUM_BINARY=$(command -v chromium-browser || command -v chromium || true)" >> $GITHUB_ENV

      - name: Start Xvfb (cli suite)
        if: matrix.suite == 'ci:test:cli'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.suite }}
        run: pnpm run ${{ matrix.suite }}

  tests-windows:
    name: Run test suite (Windows)
    runs-on: windows-latest
    # Only run Windows tests on PRs and main — skip on workflow_dispatch unless explicitly needed
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full test suite
        run: pnpm test
