name: Extension.js – Release Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel: next, stable, or canary (silent publish)"
        type: choice
        required: true
        options: [next, stable, canary]
      version:
        description: "Exact version. Use -next.* only with channel=next, plain semver only with stable. Leave empty for auto canary version."
        type: string
        required: false
      draft:
        description: "Create the GitHub Release as a draft for manual review before it goes public (stable/next only)."
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write
  deployments: write

concurrency:
  group: publish-${{ inputs.channel }}-${{ inputs.version || github.run_id }}
  cancel-in-progress: false

env:
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The bundled `javascript` template ships in the npm package as the
      # offline fast-path for `extension create`; gate releases on it being
      # in sync with the extension-js/examples source of truth. Escape hatch
      # for an urgent release: EXTENSION_SKIP_TEMPLATE_DRIFT=1.
      - name: Check bundled create template drift
        run: bash scripts/check-bundled-template-drift.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Verify pnpm
        run: |
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          # Build the develop/runtime layer and mirror built-in @extensions
          # into programs/develop/dist via the root postcompile hook.
          pnpm --filter extension-develop compile
          pnpm --filter extension-create compile
          pnpm --filter extension-install compile
          pnpm --filter extension compile
          node scripts/build-extensions.cjs

      - name: Run tests (CLI + Develop)
        run: pnpm -w test

      - name: Validate inputs
        id: validate
        run: |
          RAW='${{ inputs.version }}'
          CHANNEL='${{ inputs.channel }}'
          VERSION=$(echo "$RAW" | xargs)
          if [ "$CHANNEL" = "stable" ] && [ -z "$VERSION" ]; then
            echo "version required for stable" >&2
            exit 1
          fi
          if [ "$CHANNEL" = "next" ] && [ -z "$VERSION" ]; then
            echo "version required for next" >&2
            exit 1
          fi

          if [ "$CHANNEL" = "canary" ] && [ -z "$VERSION" ]; then
            BASE=$(node -p "require('./programs/extension/package.json').version.split('-')[0]")
            SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            VERSION="${BASE}-canary.${GITHUB_RUN_NUMBER}.${SHA}"
          fi

          if [ "$CHANNEL" = "next" ]; then
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+$' || { echo "version must be pre-release for next" >&2; exit 1; }
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-next\.[0-9A-Za-z.-]+$' || { echo "next channel requires a -next.* version" >&2; exit 1; }
          elif [ "$CHANNEL" = "canary" ]; then
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+$' || { echo "version must be pre-release for canary" >&2; exit 1; }
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-canary\.[0-9A-Za-z.-]+$' || { echo "canary channel requires a -canary.* version (or leave version empty for auto canary)" >&2; exit 1; }
          else
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "version must be plain semver for stable" >&2; exit 1; }
          fi

          SHOULD_TAG=true
          if [ "$CHANNEL" = "canary" ]; then SHOULD_TAG=false; fi
          if [ "$SHOULD_TAG" = "true" ]; then
            if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then echo "tag v$VERSION already exists on origin" >&2; exit 1; fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "$CHANNEL" = "next" ]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          elif [ "$CHANNEL" = "canary" ]; then
            echo "tag=canary" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "should_tag=$SHOULD_TAG" >> $GITHUB_OUTPUT
          echo "Resolved publish target: channel=$CHANNEL version=$VERSION npm_tag=$( [ \"$CHANNEL\" = \"next\" ] && echo next || ( [ \"$CHANNEL\" = \"canary\" ] && echo canary || echo latest ) )"

      # Notes are anchored on the on-branch release commit (not a git tag), so a
      # rewritten history can't explode the range. Highlights are read from
      # RELEASE_HIGHLIGHTS.md. We emit three renderings: full markdown (GitHub
      # Release + CHANGELOG), a condensed Discord body, and a tweet.
      - name: Generate release notes
        if: ${{ inputs.channel != 'canary' }}
        id: changelog
        env:
          CURRENT_VERSION: ${{ steps.validate.outputs.version }}
          NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          notes=$(node scripts/generate-release-notes.mjs --current-version "$CURRENT_VERSION" --format markdown)
          discord=$(node scripts/generate-release-notes.mjs --current-version "$CURRENT_VERSION" --format discord --notes-url "$NOTES_URL")
          tweet=$(node scripts/generate-release-notes.mjs --current-version "$CURRENT_VERSION" --format tweet --notes-url "$NOTES_URL")

          {
            echo "notes<<NOTES_EOF"
            echo "$notes"
            echo "NOTES_EOF"
            echo "discord<<DISCORD_EOF"
            echo "$discord"
            echo "DISCORD_EOF"
            echo "tweet<<TWEET_EOF"
            echo "$tweet"
            echo "TWEET_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure git user
        if: ${{ steps.validate.outputs.should_tag == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions (all packages) and tag
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          SHOULD_TAG: ${{ steps.validate.outputs.should_tag }}
        run: |
          node -e "const fs=require('fs');const v=process.env.VERSION;for(const p of ['programs/extension/package.json','programs/develop/package.json','programs/create/package.json','programs/install/package.json']){const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=v;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')}"
          if [ "$SHOULD_TAG" = "true" ]; then
            git add programs/extension/package.json programs/develop/package.json programs/create/package.json programs/install/package.json
            if ! git diff --cached --quiet; then git commit -m "release(${{ inputs.channel }}): v${{ steps.validate.outputs.version }}"; fi
            git tag "v${{ steps.validate.outputs.version }}"
            git push
            git push --tags
          else
            echo "Canary channel: skipping commit/tag/push."
          fi

      - name: Create GitHub Release
        if: ${{ inputs.channel != 'canary' }}
        id: create_release
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          CHANNEL: ${{ inputs.channel }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
          DRAFT: ${{ inputs.draft }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const notes = (process.env.RELEASE_NOTES || '').trim();
            const version = process.env.VERSION;
            const date = new Intl.DateTimeFormat('en-US', {
              month: 'long',
              day: 'numeric',
              year: 'numeric',
              timeZone: 'UTC'
            }).format(new Date());
            const body = notes ? notes : 'No changes listed.';
            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: `v${version}`,
              name: `${version} (${date})`,
              body,
              draft: process.env.DRAFT === 'true',
              prerelease: process.env.CHANNEL === 'next'
            });
            core.setOutput('url', release.data.html_url);

      - name: Verify Discord webhook secret for stable release
        if: ${{ inputs.channel == 'stable' }}
        env:
          WEBHOOK_URL: ${{ secrets.CHANGELOG_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "CHANGELOG_WEBHOOK_URL secret is required for stable Discord notifications." >&2
            exit 1
          fi

      - name: Notify Discord for stable release
        if: ${{ inputs.channel == 'stable' }}
        env:
          WEBHOOK_URL: ${{ secrets.CHANGELOG_WEBHOOK_URL }}
          RELEASE_TITLE: ${{ steps.validate.outputs.version }}
          RELEASE_URL: ${{ steps.create_release.outputs.url }}
          RELEASE_BODY: ${{ steps.changelog.outputs.discord }}
          AVATAR_URL: "https://user-images.githubusercontent.com/4672033/102850460-4d22aa80-43f8-11eb-82db-9efce586f73e.png"
        run: |
          python - <<'PY'
          import datetime
          import json
          import os
          import urllib.error
          import urllib.request

          body = os.environ.get("RELEASE_BODY", "").strip() or "No release notes provided."
          if len(body) > 4000:
            body = body[:3997].rstrip() + "..."

          payload = {
            "content": "||@everyone||",
            "username": "Extension.js",
            "avatar_url": os.environ.get("AVATAR_URL"),
            "embeds": [{
              "title": os.environ.get("RELEASE_TITLE"),
              "url": os.environ.get("RELEASE_URL"),
              "description": body,
              "color": 2105893,
              "footer": {"text": "Changelog"},
              "timestamp": datetime.datetime.now(datetime.UTC).isoformat()
            }]
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
            os.environ["WEBHOOK_URL"].strip(),
            data=data,
            headers={
              "Content-Type": "application/json",
              "User-Agent": "Extension.js Release Notifier"
            }
          )

          try:
            with urllib.request.urlopen(req) as resp:
              resp.read()
          except urllib.error.HTTPError as err:
            detail = err.read().decode("utf-8", errors="ignore")
            print(f"Discord webhook error {err.code}: {detail}")
            raise
          PY

      # Posts the release tweet via the X API v2 (OAuth 1.0a user context, signed
      # with the standard library). Dormant until the four X_* secrets are set;
      # if any is missing the step no-ops so releases never block on it.
      - name: Announce on X (Twitter)
        if: ${{ inputs.channel == 'stable' }}
        env:
          TWEET: ${{ steps.changelog.outputs.tweet }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import secrets
          import time
          import urllib.parse
          import urllib.request

          required = ["X_API_KEY", "X_API_SECRET", "X_ACCESS_TOKEN", "X_ACCESS_SECRET"]
          if any(not os.environ.get(name) for name in required):
            print("X_* secrets not configured; skipping tweet.")
            raise SystemExit(0)

          text = (os.environ.get("TWEET") or "").strip()
          if not text:
            print("Empty tweet body; skipping.")
            raise SystemExit(0)

          url = "https://api.twitter.com/2/tweets"
          # RFC 3986 percent-encoding (urllib quotes the unreserved set we want).
          def q(value):
            return urllib.parse.quote(str(value), safe="-._~")

          oauth = {
            "oauth_consumer_key": os.environ["X_API_KEY"],
            "oauth_token": os.environ["X_ACCESS_TOKEN"],
            "oauth_signature_method": "HMAC-SHA1",
            "oauth_timestamp": str(int(time.time())),
            "oauth_nonce": secrets.token_hex(16),
            "oauth_version": "1.0",
          }
          # JSON bodies are excluded from the OAuth signature base string.
          base_params = "&".join(
            f"{q(k)}={q(v)}" for k, v in sorted(oauth.items())
          )
          base = "&".join(["POST", q(url), q(base_params)])
          signing_key = f'{q(os.environ["X_API_SECRET"])}&{q(os.environ["X_ACCESS_SECRET"])}'
          oauth["oauth_signature"] = base64.b64encode(
            hmac.new(signing_key.encode(), base.encode(), hashlib.sha1).digest()
          ).decode()

          header = "OAuth " + ", ".join(
            f'{q(k)}="{q(v)}"' for k, v in sorted(oauth.items())
          )
          req = urllib.request.Request(
            url,
            data=json.dumps({"text": text}).encode("utf-8"),
            headers={
              "Authorization": header,
              "Content-Type": "application/json",
              "User-Agent": "Extension.js Release Notifier",
            },
          )
          with urllib.request.urlopen(req) as resp:
            print(f"Tweet posted: {resp.status}")
          PY

      - name: Update changelog for stable release
        if: ${{ inputs.channel == 'stable' }}
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const path = 'CHANGELOG.md';
            const releaseNotes = (process.env.RELEASE_NOTES || '').trim() || '- No changes listed.';
            const text = fs.readFileSync(path, 'utf8');
            const header = '## Unreleased';
            const withHeader = text.includes(header) ? text : header + '\\n\\n' + text;
            const start = withHeader.indexOf(header);
            if (start === -1) { throw new Error('CHANGELOG.md missing ## Unreleased section'); }
            const afterHeader = start + header.length;
            let nextHeader = withHeader.indexOf('\\n## ', afterHeader);
            if (nextHeader === -1) nextHeader = withHeader.length;
            const before = withHeader.slice(0, start);
            const after = withHeader.slice(nextHeader).replace(/^\\s+/, '');
            const date = new Intl.DateTimeFormat('en-US', {
              month: 'long',
              day: 'numeric',
              year: 'numeric',
              timeZone: 'UTC'
            }).format(new Date());
            const updated = [
              before,
              '## Unreleased\\n\\n',
              `## ${version} (${date})\\n\\n`,
              releaseNotes,
              '\\n\\n',
              after
            ].join('');
            fs.writeFileSync(path, updated);
          "
          # The highlights that shipped in this release are now baked into the
          # changelog/GitHub Release/Discord, so reset the file for the next cycle.
          cp scripts/release-highlights.template.md RELEASE_HIGHLIGHTS.md
          git add CHANGELOG.md RELEASE_HIGHLIGHTS.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): move changelog to v${{ steps.validate.outputs.version }}"
            git push
          else
            echo "No changelog updates to commit."
          fi

      - name: Prepare publish-only dependency rewrite (extension -> packages)
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          node -e "
            const fs=require('fs');
            const p='programs/extension/package.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            if(j.dependencies && j.dependencies['extension-develop'] && /^workspace:/.test(j.dependencies['extension-develop'])){
              j.dependencies['extension-develop'] = process.env.VERSION;
            }
            if(j.dependencies && j.dependencies['extension-create'] && /^workspace:/.test(j.dependencies['extension-create'])){
              j.dependencies['extension-create'] = process.env.VERSION;
            }
            if(j.dependencies && j.dependencies['extension-install'] && /^workspace:/.test(j.dependencies['extension-install'])){
              j.dependencies['extension-install'] = process.env.VERSION;
            }
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "

      - name: Verify npm registry
        run: npm config get registry

      - name: Check if version exists (extension-create)
        id: check_create
        working-directory: programs/create
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish extension-create [token+provenance]
        if: steps.check_create.outputs.exists == 'false'
        working-directory: programs/create
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is missing." >&2
            exit 1
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            mkdir -p "$(dirname "$NPM_CONFIG_USERCONFIG")"
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$NPM_CONFIG_USERCONFIG"
          else
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$HOME/.npmrc"
          fi
          npm publish --access public --tag ${{ steps.validate.outputs.tag }} --provenance --no-git-checks

      # Ensure npm has replicated the new version before proceeding.
      - name: Verify publish (extension-create)
        if: steps.check_create.outputs.exists == 'false'
        working-directory: programs/create
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Verifying $PKG@$VER is visible on npm..."
          for i in {1..12}; do
            if npm view "$PKG@$VER" version >/dev/null 2>&1; then
              echo "Found $PKG@$VER on npm."
              exit 0
            fi
            echo "Waiting for npm replication... ($i/12)"
            sleep 10
          done
          echo "Publish not visible on npm after waiting." >&2
          exit 1

      - name: Check if version exists (extension-develop)
        id: check_develop
        working-directory: programs/develop
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish extension-develop [token+provenance]
        if: steps.check_develop.outputs.exists == 'false'
        working-directory: programs/develop
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is missing." >&2
            exit 1
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            mkdir -p "$(dirname "$NPM_CONFIG_USERCONFIG")"
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$NPM_CONFIG_USERCONFIG"
          else
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$HOME/.npmrc"
          fi
          npm publish --access public --tag ${{ steps.validate.outputs.tag }} --provenance --no-git-checks

      # Ensure npm has replicated the new version before proceeding.
      - name: Verify publish (extension-develop)
        if: steps.check_develop.outputs.exists == 'false'
        working-directory: programs/develop
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Verifying $PKG@$VER is visible on npm..."
          for i in {1..12}; do
            if npm view "$PKG@$VER" version >/dev/null 2>&1; then
              echo "Found $PKG@$VER on npm."
              exit 0
            fi
            echo "Waiting for npm replication... ($i/12)"
            sleep 10
          done
          echo "Publish not visible on npm after waiting." >&2
          exit 1

      - name: Check if version exists (extension-install)
        id: check_install
        working-directory: programs/install
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish extension-install [token+provenance]
        if: steps.check_install.outputs.exists == 'false'
        working-directory: programs/install
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is missing." >&2
            exit 1
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            mkdir -p "$(dirname "$NPM_CONFIG_USERCONFIG")"
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$NPM_CONFIG_USERCONFIG"
          else
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$HOME/.npmrc"
          fi
          npm publish --access public --tag ${{ steps.validate.outputs.tag }} --provenance --no-git-checks

      - name: Verify publish (extension-install)
        if: steps.check_install.outputs.exists == 'false'
        working-directory: programs/install
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Verifying $PKG@$VER is visible on npm..."
          for i in {1..12}; do
            if npm view "$PKG@$VER" version >/dev/null 2>&1; then
              echo "Found $PKG@$VER on npm."
              exit 0
            fi
            echo "Waiting for npm replication... ($i/12)"
            sleep 10
          done
          echo "Publish not visible on npm after waiting." >&2
          exit 1

      - name: Check if version exists (extension)
        id: check_cli
        working-directory: programs/extension
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish extension [token+provenance]
        if: steps.check_cli.outputs.exists == 'false'
        working-directory: programs/extension
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is missing." >&2
            exit 1
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            mkdir -p "$(dirname "$NPM_CONFIG_USERCONFIG")"
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$NPM_CONFIG_USERCONFIG"
          else
            {
              echo "registry=https://registry.npmjs.org/"
              echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              echo "always-auth=true"
            } > "$HOME/.npmrc"
          fi
          npm publish --access public --tag ${{ steps.validate.outputs.tag }} --provenance --no-git-checks

      # Ensure npm has replicated the new version before proceeding.
      - name: Verify publish (extension)
        if: steps.check_cli.outputs.exists == 'false'
        working-directory: programs/extension
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          echo "Verifying $PKG@$VER is visible on npm..."
          for i in {1..12}; do
            if npm view "$PKG@$VER" version >/dev/null 2>&1; then
              echo "Found $PKG@$VER on npm."
              exit 0
            fi
            echo "Waiting for npm replication... ($i/12)"
            sleep 10
          done
          echo "Publish not visible on npm after waiting." >&2
          exit 1

      - name: Create GitHub Deployment (in_progress)
        if: ${{ inputs.channel != 'canary' }}
        id: create_deployment
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          CHANNEL: ${{ inputs.channel }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const ref = `v${process.env.VERSION}`;
            const channel = process.env.CHANNEL;
            const transient = channel === 'next';
            const production = channel === 'stable';
            const res = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref,
              environment: channel,
              auto_merge: false,
              required_contexts: [],
              description: `Release v${process.env.VERSION} to ${channel}`,
              transient_environment: transient,
              production_environment: production
            });
            core.setOutput('id', res.data.id);

      - name: Mark Deployment successful
        if: ${{ inputs.channel != 'canary' }}
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const logUrl = `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.id }}'),
              state: 'success',
              environment: '${{ inputs.channel }}',
              log_url: logUrl,
              environment_url: `https://www.npmjs.com/package/extension/v/${process.env.VERSION}`,
              auto_inactive: true
            });

